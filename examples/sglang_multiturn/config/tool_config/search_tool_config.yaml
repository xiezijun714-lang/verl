tools:
  - class_name: "verl.tools.search_tool.SearchTool"
    config:
      retrieval_service_url: "http://127.0.0.1:8000/retrieve"
      num_workers: 16
      rate_limit: 40
      timeout: 60
      type: native
    tool_schema:
      type: "function"
      function:
        name: "search"
        description: "Search for information using a list of queries. Returns relevant documents for each query."
        parameters:
          type: "object"
          properties:
            query_list:
              type: "array"
              items:
                type: "string"
              description: "A list of fully-formed semantic queries. The tool will return search results for each query."
          required:
            - "query_list"
